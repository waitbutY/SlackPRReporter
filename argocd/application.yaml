apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: slack-pr-reporter
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/slack-pr-reporter
    targetRevision: HEAD
    path: helm
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: slack-pr-reporter
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
